<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none" aria-hidden="true">
  <title>Several cats peeking out of a cardboard box</title>

  <!-- ground shadow -->
  <ellipse cx="100" cy="180" rx="74" ry="6" fill="#7C3AED" opacity="0.18"/>

  <!-- cardboard box (back wall + side flaps visible) -->
  <g transform="translate(40 78)">
    <!-- back face (rectangle) -->
    <path d="M0 24 L120 24 L120 96 L0 96 Z" fill="#A78B5A" stroke="#67E8F9" stroke-width="1.5" stroke-linejoin="round"/>
    <!-- box shading -->
    <path d="M0 24 L120 24 L120 96 L0 96 Z" fill="#1e3a8a" opacity="0.18"/>
    <!-- front-left flap (open, tilted left) -->
    <path d="M0 24 L0 0 L40 6 L40 36 Z" fill="#C99A5A" stroke="#67E8F9" stroke-width="1.5" stroke-linejoin="round"/>
    <!-- front-right flap (open, tilted right) -->
    <path d="M120 24 L120 0 L80 6 L80 36 Z" fill="#C99A5A" stroke="#67E8F9" stroke-width="1.5" stroke-linejoin="round"/>
    <!-- tape strip -->
    <rect x="56" y="50" width="8" height="46" fill="#67E8F9" opacity="0.4"/>
    <!-- box label -->
    <text x="60" y="68" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="9" font-weight="700" fill="#050816" opacity="0.55">PWR</text>
  </g>

  <!-- cat 1 (left, peeking low) -->
  <g transform="translate(54 56)">
    <ellipse cx="14" cy="20" rx="16" ry="14" fill="#E2E8F0"/>
    <path d="M2 8 L0 -6 L12 6 Z" fill="#E2E8F0"/>
    <path d="M26 8 L28 -6 L16 6 Z" fill="#E2E8F0"/>
    <circle cx="9" cy="20" r="1.6" fill="#050816"/>
    <circle cx="19" cy="20" r="1.6" fill="#050816"/>
    <path d="M12 25 L16 25 L14 27 Z" fill="#7C3AED"/>
  </g>

  <!-- cat 2 (center, taller) -->
  <g transform="translate(80 44)">
    <ellipse cx="20" cy="22" rx="18" ry="16" fill="#FFFFFF"/>
    <!-- ears -->
    <path d="M6 10 L4 -6 L18 8 Z" fill="#FFFFFF"/>
    <path d="M34 10 L36 -6 L22 8 Z" fill="#FFFFFF"/>
    <path d="M8 6 L6 -2 L14 6 Z" fill="#06B6D4" opacity="0.7"/>
    <path d="M32 6 L34 -2 L26 6 Z" fill="#06B6D4" opacity="0.7"/>
    <!-- crown (the leader of the bunch) -->
    <path d="M8 -2 L12 -10 L16 -4 L20 -12 L24 -4 L28 -10 L32 -2 Z" fill="#06B6D4" stroke="#67E8F9" stroke-width="1"/>
    <!-- eyes -->
    <circle cx="14" cy="22" r="2" fill="#050816"/>
    <circle cx="26" cy="22" r="2" fill="#050816"/>
    <circle cx="14.5" cy="21.4" r="0.6" fill="#FFFFFF"/>
    <circle cx="26.5" cy="21.4" r="0.6" fill="#FFFFFF"/>
    <path d="M18 28 L22 28 L20 30 Z" fill="#7C3AED"/>
    <path d="M20 30 q -3 4 -7 1 M20 30 q 3 4 7 1" stroke="#050816" stroke-width="1.2" stroke-linecap="round" fill="none"/>
  </g>

  <!-- cat 3 (right, peeking) -->
  <g transform="translate(124 58)">
    <ellipse cx="14" cy="20" rx="15" ry="13" fill="#E2E8F0"/>
    <path d="M2 8 L0 -4 L12 6 Z" fill="#E2E8F0"/>
    <path d="M26 8 L28 -4 L16 6 Z" fill="#E2E8F0"/>
    <path d="M4 4 L2 -2 L10 4 Z" fill="#7C3AED" opacity="0.7"/>
    <path d="M24 4 L26 -2 L18 4 Z" fill="#7C3AED" opacity="0.7"/>
    <circle cx="9" cy="20" r="1.6" fill="#050816"/>
    <circle cx="19" cy="20" r="1.6" fill="#050816"/>
    <path d="M12 25 L16 25 L14 27 Z" fill="#7C3AED"/>
  </g>

  <!-- paw popping out the top of the box -->
  <g transform="translate(112 60)">
    <ellipse cx="6" cy="6" rx="6" ry="5" fill="#FFFFFF"/>
    <circle cx="3" cy="8" r="1" fill="#7C3AED" opacity="0.6"/>
    <circle cx="6" cy="9" r="1" fill="#7C3AED" opacity="0.6"/>
    <circle cx="9" cy="8" r="1" fill="#7C3AED" opacity="0.6"/>
  </g>

  <!-- sparkles -->
  <g fill="#06B6D4" opacity="0.85">
    <path d="M28 60 l1 3 l3 1 l-3 1 l-1 3 l-1 -3 l-3 -1 l3 -1 z"/>
    <path d="M174 78 l1 3 l3 1 l-3 1 l-1 3 l-1 -3 l-3 -1 l3 -1 z" opacity="0.7"/>
    <path d="M174 36 l1 3 l3 1 l-3 1 l-1 3 l-1 -3 l-3 -1 l3 -1 z" opacity="0.6"/>
  </g>
</svg>
