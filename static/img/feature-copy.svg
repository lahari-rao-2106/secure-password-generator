<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none" aria-hidden="true">
  <title>Cat holding a clipboard labeled Ctrl+C</title>

  <!-- ground shadow -->
  <ellipse cx="100" cy="180" rx="60" ry="5" fill="#06B6D4" opacity="0.18"/>

  <!-- clipboard (held by cat, tilted slightly) -->
  <g transform="translate(96 60) rotate(8)">
    <!-- board -->
    <rect x="0" y="0" width="80" height="100" rx="8" fill="#0b1530" stroke="#67E8F9" stroke-width="2"/>
    <!-- clip -->
    <rect x="28" y="-8" width="24" height="14" rx="3" fill="#1e293b" stroke="#67E8F9" stroke-width="1.5"/>
    <rect x="34" y="-10" width="12" height="6" rx="2" fill="#67E8F9"/>
    <!-- paper -->
    <rect x="6" y="14" width="68" height="80" rx="4" fill="#FFFFFF"/>
    <!-- Ctrl+C text -->
    <text x="40" y="56" text-anchor="middle"
          font-family="ui-monospace, 'JetBrains Mono', monospace"
          font-size="18" font-weight="700" fill="#050816">Ctrl</text>
    <text x="40" y="76" text-anchor="middle"
          font-family="ui-monospace, 'JetBrains Mono', monospace"
          font-size="18" font-weight="700" fill="#06B6D4">+ C</text>
    <!-- check mark -->
    <path d="M28 86 l6 6 l14 -14" stroke="#10B981" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  <!-- cat body (sitting, peeking from behind clipboard) -->
  <g transform="translate(28 78)">
    <!-- tail -->
    <path d="M4 70 q -14 0 -10 -16" stroke="#E2E8F0" stroke-width="8" stroke-linecap="round" fill="none"/>
    <!-- body -->
    <ellipse cx="36" cy="78" rx="26" ry="20" fill="#E2E8F0"/>
    <!-- chest -->
    <ellipse cx="36" cy="82" rx="12" ry="10" fill="#FFFFFF"/>
    <!-- arm reaching up to clipboard -->
    <path d="M52 60 q 12 -6 22 -8" stroke="#E2E8F0" stroke-width="10" stroke-linecap="round" fill="none"/>
    <!-- head -->
    <ellipse cx="36" cy="38" rx="24" ry="22" fill="#E2E8F0"/>
    <!-- ears -->
    <path d="M20 22 L18 4 L34 20 Z" fill="#E2E8F0"/>
    <path d="M52 22 L54 4 L38 20 Z" fill="#E2E8F0"/>
    <path d="M22 18 L20 8 L30 18 Z" fill="#7C3AED" opacity="0.7"/>
    <path d="M50 18 L52 8 L42 18 Z" fill="#7C3AED" opacity="0.7"/>
    <!-- eyes (focused, looking at clipboard) -->
    <ellipse cx="28" cy="40" rx="2.2" ry="2.6" fill="#050816"/>
    <ellipse cx="44" cy="40" rx="2.2" ry="2.6" fill="#050816"/>
    <circle cx="28.6" cy="39" r="0.6" fill="#FFFFFF"/>
    <circle cx="44.6" cy="39" r="0.6" fill="#FFFFFF"/>
    <!-- nose & smile -->
    <path d="M34 46 L38 46 L36 49 Z" fill="#7C3AED"/>
    <path d="M36 49 q -3 4 -7 1" stroke="#050816" stroke-width="1.4" stroke-linecap="round" fill="none"/>
    <!-- whiskers -->
    <line x1="12" y1="46" x2="26" y2="46" stroke="#94A3B8" stroke-width="1"/>
    <line x1="12" y1="50" x2="26" y2="48" stroke="#94A3B8" stroke-width="1"/>
    <line x1="46" y1="46" x2="60" y2="46" stroke="#94A3B8" stroke-width="1"/>
    <line x1="46" y1="48" x2="60" y2="50" stroke="#94A3B8" stroke-width="1"/>
  </g>

  <!-- sparkles -->
  <g fill="#06B6D4" opacity="0.85">
    <path d="M40 56 l1 3 l3 1 l-3 1 l-1 3 l-1 -3 l-3 -1 l3 -1 z"/>
    <path d="M170 70 l1 3 l3 1 l-3 1 l-1 3 l-1 -3 l-3 -1 l3 -1 z" opacity="0.7"/>
  </g>
</svg>
