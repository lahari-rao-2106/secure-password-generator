<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none" aria-hidden="true">
  <title>Cool cat wearing sunglasses with a lightning bolt</title>

  <!-- ground shadow -->
  <ellipse cx="100" cy="178" rx="55" ry="5" fill="#7C3AED" opacity="0.18"/>

  <!-- lightning bolt behind cat -->
  <g transform="translate(132 50)">
    <path d="M22 0 L0 50 L16 50 L8 92 L36 36 L20 36 L28 0 Z"
          fill="#06B6D4" stroke="#67E8F9" stroke-width="2" stroke-linejoin="round"/>
    <path d="M22 4 L6 48 L20 48 L14 80"
          fill="none" stroke="#FFFFFF" stroke-width="1.2" stroke-linejoin="round" opacity="0.7"/>
  </g>

  <!-- cat body -->
  <g transform="translate(40 70)">
    <!-- tail (z-shaped, energetic) -->
    <path d="M0 78 q -16 -8 -10 -24 q 4 -10 14 -8"
          stroke="#E2E8F0" stroke-width="9" stroke-linecap="round" fill="none"/>
    <path d="M0 78 q -16 -8 -10 -24 q 4 -10 14 -8"
          stroke="#06B6D4" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.6"/>
    <!-- body -->
    <ellipse cx="48" cy="80" rx="30" ry="24" fill="#E2E8F0"/>
    <!-- chest -->
    <ellipse cx="48" cy="86" rx="14" ry="12" fill="#FFFFFF"/>
    <!-- arms (raised coolly) -->
    <path d="M28 64 q -10 -4 -14 -14" stroke="#E2E8F0" stroke-width="10" stroke-linecap="round" fill="none"/>
    <path d="M68 64 q 10 -4 14 -14" stroke="#E2E8F0" stroke-width="10" stroke-linecap="round" fill="none"/>
    <!-- head -->
    <ellipse cx="48" cy="42" rx="28" ry="25" fill="#E2E8F0"/>
    <!-- ears -->
    <path d="M28 24 L24 4 L42 22 Z" fill="#E2E8F0"/>
    <path d="M68 24 L72 4 L54 22 Z" fill="#E2E8F0"/>
    <path d="M30 20 L28 8 L38 20 Z" fill="#7C3AED" opacity="0.7"/>
    <path d="M66 20 L68 8 L58 20 Z" fill="#7C3AED" opacity="0.7"/>
    <!-- sunglasses -->
    <g transform="translate(48 42)">
      <!-- bridge -->
      <line x1="-14" y1="0" x2="14" y2="0" stroke="#050816" stroke-width="2"/>
      <!-- left lens -->
      <rect x="-26" y="-7" width="22" height="13" rx="6" fill="#050816"/>
      <!-- right lens -->
      <rect x="4" y="-7" width="22" height="13" rx="6" fill="#050816"/>
      <!-- cyan glint -->
      <line x1="-22" y1="-4" x2="-12" y2="-4" stroke="#67E8F9" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="8" y1="-4" x2="18" y2="-4" stroke="#67E8F9" stroke-width="1.5" stroke-linecap="round"/>
    </g>
    <!-- nose & mouth -->
    <path d="M44 50 L52 50 L48 53 Z" fill="#7C3AED"/>
    <path d="M48 53 q -3 4 -8 1 M48 53 q 3 4 8 1" stroke="#050816" stroke-width="1.4" stroke-linecap="round" fill="none"/>
    <!-- smirk -->
    <path d="M58 50 q 6 0 8 -3" stroke="#050816" stroke-width="1.4" stroke-linecap="round" fill="none"/>
  </g>

  <!-- sparkles -->
  <g fill="#06B6D4" opacity="0.85">
    <path d="M30 60 l1 3 l3 1 l-3 1 l-1 3 l-1 -3 l-3 -1 l3 -1 z"/>
    <path d="M170 130 l1 3 l3 1 l-3 1 l-1 3 l-1 -3 l-3 -1 l3 -1 z" opacity="0.7"/>
    <path d="M24 130 l1 3 l3 1 l-3 1 l-1 3 l-1 -3 l-3 -1 l3 -1 z" opacity="0.6"/>
  </g>
</svg>
