<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none" aria-hidden="true">
  <title>Cat at a laptop with a padlock floating above</title>

  <!-- ground shadow -->
  <ellipse cx="100" cy="178" rx="60" ry="5" fill="#7C3AED" opacity="0.18"/>

  <!-- padlock floating above laptop -->
  <g transform="translate(140 36)">
    <!-- shackle -->
    <path d="M10 22 v -8 a 14 14 0 0 1 28 0 v 8" stroke="#67E8F9" stroke-width="4" fill="none" stroke-linecap="round"/>
    <!-- body -->
    <rect x="2" y="20" width="44" height="32" rx="6" fill="#06B6D4"/>
    <rect x="2" y="20" width="44" height="32" rx="6" fill="none" stroke="#67E8F9" stroke-width="2"/>
    <!-- keyhole -->
    <circle cx="24" cy="34" r="3.2" fill="#050816"/>
    <rect x="22.5" y="34" width="3" height="8" fill="#050816"/>
    <!-- glow -->
    <circle cx="24" cy="36" r="24" fill="#06B6D4" opacity="0.18"/>
  </g>

  <!-- laptop -->
  <g transform="translate(40 96)">
    <!-- base -->
    <path d="M-6 60 L122 60 L116 70 L-2 70 Z" fill="#1e293b" stroke="#67E8F9" stroke-width="1.5" stroke-linejoin="round"/>
    <!-- screen -->
    <rect x="6" y="0" width="104" height="60" rx="6" fill="#0b1530" stroke="#67E8F9" stroke-width="2"/>
    <!-- screen glow (login dots) -->
    <circle cx="30" cy="30" r="3" fill="#67E8F9"/>
    <circle cx="50" cy="30" r="3" fill="#67E8F9" opacity="0.7"/>
    <circle cx="70" cy="30" r="3" fill="#67E8F9" opacity="0.5"/>
    <rect x="22" y="42" width="72" height="6" rx="3" fill="#67E8F9" opacity="0.4"/>
  </g>

  <!-- cat behind the laptop (head + paws) -->
  <g transform="translate(60 50)">
    <!-- head -->
    <ellipse cx="40" cy="40" rx="28" ry="24" fill="#E2E8F0"/>
    <!-- ears -->
    <path d="M20 22 L18 4 L36 22 Z" fill="#E2E8F0"/>
    <path d="M60 22 L62 4 L44 22 Z" fill="#E2E8F0"/>
    <path d="M22 18 L20 8 L32 18 Z" fill="#7C3AED" opacity="0.7"/>
    <path d="M58 18 L60 8 L48 18 Z" fill="#7C3AED" opacity="0.7"/>
    <!-- eyes (peering over laptop) -->
    <circle cx="30" cy="42" r="2.6" fill="#050816"/>
    <circle cx="50" cy="42" r="2.6" fill="#050816"/>
    <circle cx="30.6" cy="41" r="0.7" fill="#FFFFFF"/>
    <circle cx="50.6" cy="41" r="0.7" fill="#FFFFFF"/>
    <!-- nose & mouth -->
    <path d="M36 50 L44 50 L40 53 Z" fill="#7C3AED"/>
    <path d="M40 53 q -3 3 -6 1 M40 53 q 3 3 6 1" stroke="#050816" stroke-width="1.4" stroke-linecap="round" fill="none"/>
    <!-- whiskers -->
    <line x1="14" y1="50" x2="28" y2="50" stroke="#94A3B8" stroke-width="1"/>
    <line x1="14" y1="54" x2="28" y2="52" stroke="#94A3B8" stroke-width="1"/>
    <line x1="52" y1="50" x2="66" y2="50" stroke="#94A3B8" stroke-width="1"/>
    <line x1="52" y1="52" x2="66" y2="54" stroke="#94A3B8" stroke-width="1"/>
  </g>

  <!-- sparkles -->
  <g fill="#7C3AED" opacity="0.85">
    <path d="M28 50 l1 3 l3 1 l-3 1 l-1 3 l-1 -3 l-3 -1 l3 -1 z"/>
    <path d="M170 120 l1 3 l3 1 l-3 1 l-1 3 l-1 -3 l-3 -1 l3 -1 z" opacity="0.7"/>
  </g>
</svg>
